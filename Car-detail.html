<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLuxe | Premium Vehicles</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap');

        /* CSS Variables */
        :root {
            --bg-base: #08080a;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --bg-glass-hover: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.15);
            --accent-neon: #00f3ff;
            --accent-neon-glow: rgba(0, 243, 255, 0.5);
            --text-primary: #ffffff;
            /* ACCESSIBILITY UPDATE: Lightened secondary text for better contrast */
            --text-secondary: #d1d1d6; 
            --font-main: 'Outfit', sans-serif;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        ::selection {
            background: var(--accent-neon);
            color: #000;
        }

        /* Minimalist Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(8, 8, 10, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-primary);
            text-decoration: none;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-neon);
            text-shadow: 0 0 10px var(--accent-neon-glow);
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        nav a:hover {
            color: var(--text-primary);
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent-neon);
            transition: var(--transition);
            box-shadow: 0 0 8px var(--accent-neon-glow);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100vw;
            height: 70vh;
            display: flex;
            align-items: flex-end;
            /* Background image is now set dynamically via JS */
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-base) 0%, transparent 50%, rgba(8,8,10,0.6) 100%);
        }

        /* Main Content Container */
        .container {
            max-width: 1400px;
            margin: -80px auto 0;
            padding: 0 5%;
            position: relative;
            z-index: 10;
        }

        /* Header Info */
        .car-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .car-title-wrapper h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #a0a0ab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .car-title-wrapper p {
            font-size: 1.2rem;
            color: var(--accent-neon);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .price-tag {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Bento Box Grid */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 180px;
            gap: 24px;
            margin-bottom: 40px;
        }

        .bento-item {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .bento-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-25deg);
            transition: var(--transition);
        }

        .bento-item:hover {
            transform: translateY(-5px);
            background: var(--bg-glass-hover);
            border-color: var(--border-highlight);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .bento-item:hover::before {
            left: 200%;
            transition: 0.8s ease-in-out;
        }

        .bento-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 500; /* ACCESSIBILITY: Increased font weight slightly */
        }

        .bento-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Grid Placements */
        .item-brand {
            grid-column: span 2;
            background: radial-gradient(circle at top right, rgba(0, 243, 255, 0.1), transparent 70%), var(--bg-glass);
        }

        .item-brand .bento-value {
            font-size: 2.5rem;
        }

        .item-color {
            grid-row: span 2;
            justify-content: flex-end;
        }
        
        .color-swatch {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .item-description {
            grid-column: span 3;
            grid-row: span 2;
            justify-content: flex-start;
        }

        .item-description .bento-value {
            font-size: 1.1rem;
            font-weight: 300;
            /* ACCESSIBILITY: Brighter white for paragraph text */
            color: #f2f2f7; 
            line-height: 1.8;
            margin-top: 10px;
        }
        
        /* new：Decrease Drivetrain */
        .item-drivetrain .bento-value {
            font-size: 1.5rem; 
            line-height: 1.2;
        }

        /* Action Area */
        .action-area {
            display: flex;
            justify-content: center;
            margin: 60px 0 100px;
        }

        .btn-contact {
            background: transparent;
            color: var(--accent-neon);
            font-family: var(--font-main);
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 20px 50px;
            border: 1px solid var(--accent-neon);
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1), inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .btn-contact:hover {
            background: var(--accent-neon);
            color: var(--bg-base);
            box-shadow: 0 0 30px var(--accent-neon-glow), inset 0 0 20px rgba(255, 255, 255, 0.5);
            text-shadow: none;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .car-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .bento-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .item-brand, .item-description {
                grid-column: span 2;
            }
            .item-color {
                grid-row: span 1;
            }
            .color-swatch {
                width: 40px;
                height: 40px;
                margin-bottom: 10px;
            }
        }

        @media (max-width: 768px) {
            nav { display: none; }
            .hero { height: 50vh; }
            .car-title-wrapper h1 { font-size: 2.5rem; }
            .price-tag { font-size: 2.5rem; }
            .bento-grid { grid-template-columns: 1fr; grid-auto-rows: auto; }
            .item-brand, .item-description { grid-column: span 1; }
            .item-description { grid-row: span 1; }
            .bento-item { padding: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Auto<span>Luxe</span></a>
        <nav>
            <a href="#">Home</a>
            <a href="#">Search</a>
            <a href="#">Seller Login</a>
            <a href="#">Upload Car</a>
        </nav>
    </header>

    <div class="hero" id="hero-section"></div>

    <main class="container">
        
        <div class="car-header">
            <div class="car-title-wrapper">
                <p id="car-condition"></p>
                <h1 id="car-title"></h1>
            </div>
            <div class="price-tag" id="car-price"></div>
        </div>

        <div class="bento-grid">
            
            <div class="bento-item item-brand">
                <div class="bento-label">Make & Trim</div>
                <div class="bento-value" id="spec-brand"></div>
            </div>

            <div class="bento-item item-year">
                <div class="bento-label">Year</div>
                <div class="bento-value" id="spec-year"></div>
            </div>

            <div class="bento-item item-color">
                <div class="color-swatch" id="spec-color-swatch"></div>
                <div class="bento-label">Exterior</div>
                <div class="bento-value" id="spec-color-name"></div>
            </div>

            <div class="bento-item item-mileage">
                <div class="bento-label">Mileage</div>
                <div class="bento-value" id="spec-mileage"></div>
            </div>

            <div class="bento-item item-location">
                <div class="bento-label">Location</div>
                <div class="bento-value" id="spec-location"></div>
            </div>
            
            <div class="bento-item item-drivetrain">
                <div class="bento-label">Fuel & Trans</div>
                <div class="bento-value" id="spec-drivetrain"></div>
            </div>

            <div class="bento-item item-description">
                <div class="bento-label">Seller Notes</div>
                <div class="bento-value" id="spec-description"></div>
            </div>
            
        </div>

        <div class="action-area">
            <button class="btn-contact">Contact Seller</button>
        </div>

    </main>

    <script>
        // 1. Define the Car Database
        const carDatabase = {
            "1": {
                condition: "Premium Certified Used",
                title: "2024 Toyota Camry",
                price: "$32,450",
                brand: "Toyota Camry XSE",
                year: "2024",
                colorName: "Midnight Black",
                colorGradient: "linear-gradient(145deg, #1f1f1f, #000000)",
                mileage: "12,450 mi",
                location: "Beverly Hills, CA",
                drivetrain: "Petrol & Auto", 
                description: "Immaculate condition 2024 Toyota Camry XSE V6. This vehicle merges reliable performance with a surprisingly aggressive, premium aesthetic. Features a panoramic glass roof, sport-tuned suspension, and custom Cockpit Red leather interior. Single owner, garage kept. Fully detailed and ready for its next driver.",
                heroImg: "https://images.unsplash.com/photo-1621007947382-bb3c3994e3fb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
            },
            "2": {
                condition: "Like-New Executive Lease",
                title: "2023 BMW M4 Comp",
                price: "$82,900",
                brand: "BMW M4 Competition",
                year: "2023",
                colorName: "Isle of Man Green",
                colorGradient: "linear-gradient(145deg, #0d4a22, #052911)",
                mileage: "6,200 mi",
                location: "Miami, FL",
                drivetrain: "Petrol & Auto", 
                description: "A pure driver's car. 503 hp twin-turbo inline-six, all-wheel drive, carbon fiber roof, and Kyalami Orange/Black Merino leather interior. Flawless condition, zero modifications, clear PPF applied on the entire front end to protect the stunning metallic paint.",
                heroImg: "https://images.unsplash.com/photo-1617531653332-bd46c24f2068?q=80&w=2670&auto=format&fit=crop"
            },
            "3": {
                condition: "Electric Performance Pre-Owned",
                title: "2022 Tesla Model S",
                price: "$89,500",
                brand: "Tesla Model S Plaid",
                year: "2022",
                colorName: "Solid Black",
                colorGradient: "linear-gradient(145deg, #2b2b2b, #000000)",
                mileage: "18,900 mi",
                location: "Austin, TX",
                drivetrain: "Electric & Auto", 
                description: "0-60 mph in 1.99s. 1,020 horsepower tri-motor AWD. Black and White premium interior with Carbon Fiber decor. Includes the Yoke steering wheel and Full Self-Driving Capability. Battery health is excellent; always home-charged to 80%.",
                heroImg: "https://images.unsplash.com/photo-1617788138017-80ad40651399?q=80&w=2670&auto=format&fit=crop"
            }
        };

        // 2. Fetch the ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        let currentId = urlParams.get('id');

        // 3. Fallback to ID 1 if no ID is present or if the ID doesn't exist in the database
        if (!currentId || !carDatabase[currentId]) {
            currentId = "1";
        }

        // 4. Extract the active car's data
        const activeCar = carDatabase[currentId];

        // 5. Inject data into HTML elements via DOM manipulation
        document.title = `${activeCar.title} | AutoLuxe`;
        document.getElementById('hero-section').style.backgroundImage = `url('${activeCar.heroImg}')`;
        document.getElementById('car-condition').textContent = activeCar.condition;
        document.getElementById('car-title').textContent = activeCar.title;
        document.getElementById('car-price').textContent = activeCar.price;
        
        document.getElementById('spec-brand').textContent = activeCar.brand;
        document.getElementById('spec-year').textContent = activeCar.year;
        
        document.getElementById('spec-color-name').textContent = activeCar.colorName;
        document.getElementById('spec-color-swatch').style.background = activeCar.colorGradient;
        
        document.getElementById('spec-mileage').textContent = activeCar.mileage;
        document.getElementById('spec-location').textContent = activeCar.location;
        
        document.getElementById('spec-drivetrain').textContent = activeCar.drivetrain;

        document.getElementById('spec-description').textContent = activeCar.description;

    </script>
</body>
</html>
