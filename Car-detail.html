<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniCars | Premium Vehicles</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap');

        /* CSS Variables */
        :root {
            --bg-base: #08080a;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --bg-glass-hover: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.15);
            --accent-neon: #00f3ff;
            --accent-neon-glow: rgba(0, 243, 255, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #d1d1d6; 
            --font-main: 'Outfit', sans-serif;
            --transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Reset & Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        ::selection { background: var(--accent-neon); color: #000; }

        /* Minimalist Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(8, 8, 10, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-primary);
            text-decoration: none;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-neon);
            text-shadow: 0 0 10px var(--accent-neon-glow);
        }

        nav { display: flex; gap: 30px; }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        nav a:hover { color: var(--text-primary); }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent-neon);
            transition: var(--transition);
            box-shadow: 0 0 8px var(--accent-neon-glow);
        }

        nav a:hover::after { width: 100%; }

        /* Hero Section */
        .hero {
            position: relative;
            width: 100vw;
            height: 70vh;
            display: flex;
            align-items: flex-end;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-base) 0%, transparent 50%, rgba(8,8,10,0.6) 100%);
        }

        /* Main Content Container */
        .container {
            max-width: 1400px;
            margin: -80px auto 0;
            padding: 0 5%;
            position: relative;
            z-index: 10;
        }

        /* Header Info */
        .car-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .car-title-wrapper h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #a0a0ab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .car-title-wrapper p {
            font-size: 1.2rem;
            color: var(--accent-neon);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .price-tag {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Bento Box Grid */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 180px;
            gap: 24px;
            margin-bottom: 40px;
        }

        .bento-item {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .bento-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-25deg);
            transition: var(--transition);
        }

        .bento-item:hover {
            transform: translateY(-5px);
            background: var(--bg-glass-hover);
            border-color: var(--border-highlight);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .bento-item:hover::before {
            left: 200%;
            transition: 0.8s ease-in-out;
        }

        .bento-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .bento-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Grid Placements */
        .item-brand { grid-column: span 2; background: radial-gradient(circle at top right, rgba(0, 243, 255, 0.1), transparent 70%), var(--bg-glass); }
        .item-brand .bento-value { font-size: 2.5rem; }
        .item-color { grid-row: span 2; justify-content: flex-end; }
        .color-swatch {
            width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }
        .item-description { grid-column: span 3; grid-row: span 2; justify-content: flex-start; }
        .item-description .bento-value { font-size: 1.1rem; font-weight: 300; color: #f2f2f7; line-height: 1.8; margin-top: 10px; }
        .item-drivetrain .bento-value { font-size: 1.5rem; line-height: 1.2; }

        /* Action Area */
        .action-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 60px 0 100px;
        }

        .btn-contact, .btn-compare {
            background: transparent;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 18px 45px;
            border: 1px solid var(--border-highlight);
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .btn-contact {
            color: var(--accent-neon);
            border-color: var(--accent-neon);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1), inset 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .btn-contact:hover {
            background: var(--accent-neon);
            color: var(--bg-base);
            box-shadow: 0 0 30px var(--accent-neon-glow), inset 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .btn-compare {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
        }

        .btn-compare:hover {
            background: var(--border-glass);
            border-color: var(--text-primary);
            transform: translateY(-2px);
        }

        /* --- NEW FEATURES CSS --- */

        /* Toast Notification */
        .toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--accent-neon);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-primary);
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--accent-neon-glow);
        }

        .toast.show { top: 40px; }

        /* Vehicle Not Found State */
        .not-found-state {
            display: none; /* Hidden by default */
            height: 100vh;
            width: 100vw;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: var(--bg-base);
            z-index: 50;
            position: relative;
        }

        .not-found-state h1 {
            font-size: 5rem;
            background: linear-gradient(to right, #ff4b4b, #ff0000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .not-found-state p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        /* Compare Overlay - REAMPED FOR COOLER LAYOUT */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 8, 10, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 500;
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .overlay.active { display: flex; opacity: 1; }

        .overlay-content {
            background: rgba(255,255,255, 0.01);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            width: 95%;
            max-width: 1300px;
            max-height: 95vh;
            padding: 40px;
            position: relative;
            overflow-y: auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .close-overlay {
            position: absolute;
            top: 30px;
            right: 30px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 2.5rem;
            line-height: 1;
            cursor: pointer;
            transition: var(--transition);
            z-index: 10;
        }

        .close-overlay:hover { color: var(--accent-neon); transform: rotate(90deg); }

        .overlay-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .compare-grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .compare-column {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 20px;
            transition: var(--transition);
        }
        
        /* Fixed Column Header styling */
        .comp-header-fixed {
            padding: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-glass);
        }
        
        .comp-label-fixed {
            font-size: 0.8rem;
            color: var(--accent-neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* Dynamic Dropdown Container styling */
        .comp-header-dynamic {
            margin-bottom: 20px;
        }

        .compare-dropdown {
            width: 100%;
            background: var(--bg-base);
            color: var(--text-primary);
            border: 1px solid var(--border-highlight);
            padding: 15px 20px;
            font-family: var(--font-main);
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 12px;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .compare-dropdown:focus { border-color: var(--accent-neon); box-shadow: 0 0 10px var(--accent-neon-glow); }

        /* Vehicle Render Area (Image + New Grid) */
        .compare-render-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        /* Cooler Image container with neon glow */
        .comp-img-container {
            width: 100%;
            height: 250px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-glass);
            background: radial-gradient(circle at center, rgba(0,243,255, 0.05) 0%, transparent 70%);
        }
        
        .comp-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        
        /* Main Title/Price block */
        .comp-main-info {
            padding: 0 10px;
        }
        
        .comp-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #a0a0ab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .comp-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-neon);
            text-shadow: 0 0 10px var(--accent-neon-glow);
        }

        /* Miniature Bento Grid for Specs within comparison */
        .comp-specs-mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .comp-spec-tile {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 15px 20px;
        }
        
        .comp-spec-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }
        
        .comp-spec-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        /* Drivetrain special styling to handle longer text if needed */
        .tile-drivetrain .comp-spec-value {
            font-size: 1.1rem;
        }
        
        /* Fade animation for dynamic loading */
        .fade-in {
            animation: fadeInAnim 0.5s ease forwards;
        }
        
        @keyframes fadeInAnim {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .car-header { flex-direction: column; align-items: flex-start; gap: 20px; }
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
            .item-brand, .item-description { grid-column: span 2; }
            .item-color { grid-row: span 1; }
            
            .overlay-content { width: 98%; padding: 20px; }
            .compare-grid-layout { gap: 15px; }
            .comp-title { font-size: 1.5rem; }
            .comp-price { font-size: 1.4rem; }
            .comp-img-container { height: 180px; }
        }

        @media (max-width: 768px) {
            nav { display: none; }
            .hero { height: 50vh; }
            .car-title-wrapper h1 { font-size: 2.5rem; }
            .price-tag { font-size: 2.5rem; }
            .bento-grid { grid-template-columns: 1fr; grid-auto-rows: auto; }
            .item-brand, .item-description { grid-column: span 1; }
            .item-description { grid-row: span 1; }
            .bento-item { padding: 25px; }
            .action-area { flex-direction: column; }
            
            /* Stack columns on mobile */
            .compare-grid-layout { grid-template-columns: 1fr; gap: 30px; }
            .comp-img-container { height: 200px; }
        }
    </style>
</head>

                drivetrain: "AWD",
                description: "Hypercar performance with zero emissions. Mind-bending acceleration, sleek aerodynamic design, and advanced Tesla technology. A rare find in this stunning Glacier White finish.",

        };

        // 2. State Management & Error Handling
        const urlParams = new URLSearchParams(window.location.search);
        let currentId = urlParams.get('id');

        const heroSection = document.getElementById('hero-section');
        const mainContainer = document.getElementById('main-container');
        const notFoundState = document.getElementById('not-found-state');

        if (!currentId || !carDatabase[currentId]) {
            // Show 404 State
            document.title = "Vehicle Not Found | AutoLuxe";
            heroSection.style.display = 'none';
            mainContainer.style.display = 'none';
            notFoundState.style.display = 'flex';
        } else {
            // Initialize Normal UI
            const activeCar = carDatabase[currentId];

            // Render Main Page
            document.title = `${activeCar.title} | AutoLuxe`;
            heroSection.style.backgroundImage = `url('${activeCar.heroImg}')`;
            document.getElementById('car-condition').textContent = activeCar.condition;
            document.getElementById('car-title').textContent = activeCar.title;
            document.getElementById('car-price').textContent = activeCar.price;
            
            document.getElementById('spec-brand').textContent = activeCar.brand;
            document.getElementById('spec-year').textContent = activeCar.year;
            document.getElementById('spec-color-name').textContent = activeCar.colorName;
            document.getElementById('spec-color-swatch').style.background = activeCar.colorGradient;
            document.getElementById('spec-mileage').textContent = activeCar.mileage;
            document.getElementById('spec-location').textContent = activeCar.location;
            document.getElementById('spec-drivetrain').textContent = activeCar.drivetrain;
            document.getElementById('spec-description').textContent = activeCar.description;

            // --- Features Implementation ---

            // Toast Notification
            document.getElementById('btn-contact').addEventListener('click', () => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 3000);
            });

            // Compare Overlay Variables
            const btnCompare = document.getElementById('btn-compare');
            const overlay = document.getElementById('compare-overlay');
            const closeOverlay = document.getElementById('close-overlay');
            const compareSelect = document.getElementById('compare-select');
            
            // New Slots for COOLER layout
            const lockedSlot = document.getElementById('locked-render-slot');
            const dynamicSlot = document.getElementById('dynamic-render-slot');

            // NEW Helper to generate COOLER spec HTML with Image and Mini-Grid
            const generateCoolerRenderHTML = (car) => `
                <div class="comp-img-container">
                    <img src="${car.heroImg}" alt="${car.title}">
                </div>
                <div class="comp-main-info">
                    <div class="comp-title">${car.title}</div>
                    <div class="comp-price">${car.price}</div>
                </div>
                <div class="comp-specs-mini-grid">
                    <div class="comp-spec-tile">
                        <div class="comp-spec-label">Year</div>
                        <div class="comp-spec-value">${car.year}</div>
                    </div>
                    <div class="comp-spec-tile tile-drivetrain">
                        <div class="comp-spec-label">Drivetrain</div>
                        <div class="comp-spec-value">${car.drivetrain}</div>
                    </div>
                    <div class="comp-spec-tile">
                        <div class="comp-spec-label">Mileage</div>
                        <div class="comp-spec-value">${car.mileage}</div>
                    </div>
                    <div class="comp-spec-tile">
                        <div class="comp-spec-label">Location</div>
                        <div class="comp-spec-value">${car.location}</div>
                    </div>
                     <div class="comp-spec-tile">
                        <div class="comp-spec-label">Trim</div>
                        <div class="comp-spec-value">${car.brand.split(' ').pop()}</div>
                    </div>
                     <div class="comp-spec-tile">
                        <div class="comp-spec-label">Color</div>
                        <div class="comp-spec-value">${car.colorName.split(' ').pop()}</div>
                    </div>
                </div>
            `;

            // Open Overlay & Populate
            btnCompare.addEventListener('click', () => {
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden'; // Prevent background scrolling

                // Render Left (Locked) Side with Image/Grid
                lockedSlot.innerHTML = generateCoolerRenderHTML(activeCar);

                // Populate Dropdown for Right Side
                compareSelect.innerHTML = '<option value="" disabled selected>Select vehicle to compare...</option>';
                let firstAvailableId = null;

                for (const [id, car] of Object.entries(carDatabase)) {
                    if (id !== currentId) {
                        if (!firstAvailableId) firstAvailableId = id; // Track first option to auto-render
                        const option = document.createElement('option');
                        option.value = id;
                        option.textContent = car.title;
                        compareSelect.appendChild(option);
                    }
                }

                // Auto-select and render the first available comparison car with COOLER layout
                if (firstAvailableId) {
                    compareSelect.value = firstAvailableId;
                    dynamicSlot.innerHTML = generateCoolerRenderHTML(carDatabase[firstAvailableId]);
                    dynamicSlot.classList.add('fade-in'); // Add animation
                    // Remove animation class after it plays so it can re-trigger on change
                    setTimeout(() => dynamicSlot.classList.remove('fade-in'), 500);
                } else {
                    dynamicSlot.innerHTML = '<div class="comp-main-info"><div class="comp-spec-label">No other vehicles available to compare.</div></div>';
                }
            });

            // Handle Dropdown Change with animation
            compareSelect.addEventListener('change', (e) => {
                const selectedCar = carDatabase[e.target.value];
                if (selectedCar) {
                    // Re-trigger fade animation
                    dynamicSlot.classList.remove('fade-in');
                    void dynamicSlot.offsetWidth; // Trigger reflow to restart animation
                    
                    dynamicSlot.innerHTML = generateCoolerRenderHTML(selectedCar);
                    dynamicSlot.classList.add('fade-in');
                    setTimeout(() => dynamicSlot.classList.remove('fade-in'), 500);
                }
            });

            // Close Overlay
            closeOverlay.addEventListener('click', () => {
                overlay.classList.remove('active');
                document.body.style.overflow = 'auto'; // Restore scrolling
            });

            // Close overlay on outside click
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                    document.body.style.overflow = 'auto';
                }
            });
        }
    </script>
